name: Run Mypy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  mypy:
    runs-on: [self-hosted, windows, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Type Check
        run: mypy .

      - name: Ruff Check
        run: ruff check .

      - name: Ruff Format
        run: ruff format --check .

      - name: Run Tests
        run: python -m pytest
        env:
          TEST_SHOPIFY_SHOP_DOMAIN: ${{ secrets.TEST_SHOPIFY_SHOP_DOMAIN }}
          TEST_SHOPIFY_ACCESS_TOKEN: ${{ secrets.TEST_SHOPIFY_ACCESS_TOKEN }}
          TEST_SHOPIFY_API_VERSION: ${{ secrets.TEST_SHOPIFY_API_VERSION }}

      - name: Lint with Vulture
        run: vulture ./shopify_sdk/ --min-confidence 100