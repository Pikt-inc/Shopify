name: Run Mypy

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  mypy:
    runs-on: [self-hosted, windows, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy

      - name: Run Mypy
        run: mypy .